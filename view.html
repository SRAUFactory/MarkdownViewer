<!DOCTYPE html>
<html>
    <head>
        <title>{{.Title}} - Markdown Viewer</title>
        <meta charset="utf-8">
        <style type="text/css">
        <!--
             pre {
                 background-color: gray;
             }
             code {
                 background-color: gray;
                 color: #DDD;
             }
        -->
        </style>
    </head>
    <body>
        <header style="border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 20px;">
            <h1 style="margin: 0 0 5px 0;">{{.Title}}</h1>
            {{if .UpdatedAt}}
            <small style="color: #666;">Updated at: {{.UpdatedAt}}</small>
            {{end}}
        </header>
        <article>
            {{.Body}}
        </article>
    </body>
</html>
